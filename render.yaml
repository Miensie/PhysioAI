# render.yaml — Blueprint Render
# Déploie backend FastAPI + frontend statique

services:

  # ── Backend FastAPI ─────────────────────────────────────────────────────────
  - type: web
    name: physioai-backend-6iqm        # ← nom exact de votre service Render
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: LOG_LEVEL
        value: INFO
      # Autorise GitHub Pages + localhost
      # Pour ajouter une origine : séparer par virgule
      - key: CORS_ORIGINS
        value: "https://miensie.github.io,http://localhost:3000,http://127.0.0.1:5500"

    autoDeploy: true

  # ── Frontend statique (GitHub Pages recommandé) ─────────────────────────────
  # Le frontend est déjà servi par GitHub Pages → miensie.github.io
  # Ce service Render frontend est optionnel si vous utilisez GitHub Pages
  - type: web
    name: physioai-lab-frontend
    runtime: static
    region: frankfurt
    plan: free
    rootDir: frontend
    staticPublishPath: .
    headers:
      - path: /*
        name: Access-Control-Allow-Origin
        value: "*"
    routes:
      - type: rewrite
        source: /*
        destination: /taskpane.html
    autoDeploy: true