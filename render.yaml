# render.yaml — À placer à la RACINE du dépôt GitHub
services:
  - type: web
    name: physioai-backend
    runtime: python
    region: frankfurt
    plan: free
    # PAS de rootDir — les commandes gèrent le chemin
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
      - key: ENVIRONMENT
        value: production
    autoDeploy: true