name: Deploy PhysioAI Lab

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ══════════════════════════════════════════════════════════════
  # JOB 1 — Tests backend
  # ══════════════════════════════════════════════════════════════
  test-backend:
    name: 🧪 Tests Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}/backend

  # ══════════════════════════════════════════════════════════════
  # JOB 2 — Deploy frontend → GitHub Pages
  # ══════════════════════════════════════════════════════════════
  deploy-frontend:
    name: 🌐 Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: test-backend
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject backend URL into api.js
        run: |
          BACKEND_URL="${{ secrets.BACKEND_URL }}"
          if [ -n "$BACKEND_URL" ]; then
            sed -i "s|http://localhost:8000|${BACKEND_URL}|g" scripts/api.js
            echo "✅ Backend URL injectée : $BACKEND_URL"
          else
            echo "⚠️  BACKEND_URL non défini — localhost conservé"
          fi

      - name: Update manifest.xml with GitHub Pages URL
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          sed -i "s|https://localhost:3000|${PAGES_URL}|g" manifest.xml
          echo "✅ manifest.xml mis à jour : $PAGES_URL"

      - name: Prepare site content
        run: |
          mkdir -p _site
          cp -r scripts  _site/
          cp -r styles   _site/
          cp    taskpane.html _site/
          cp    manifest.xml      _site/
          [ -d docs ] && cp -r docs _site/ || true
          [ -f index.html ] && cp index.html _site/ || cp taskpane.html _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ══════════════════════════════════════════════════════════════
  # JOB 3 — Trigger redéploiement Render
  # La condition sur le secret est dans le script shell,
  # pas dans le if: du job (non supporté par GitHub Actions)
  # ══════════════════════════════════════════════════════════════
  deploy-backend:
    name: 🚀 Trigger Backend (Render)
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Trigger Render deploy
        run: |
          if [ -n "$RENDER_HOOK" ]; then
            curl -s -X POST "$RENDER_HOOK"
            echo "✅ Déploiement Render déclenché"
          else
            echo "⏭️  RENDER_DEPLOY_HOOK non configuré — étape ignorée"
          fi
        env:
          RENDER_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}